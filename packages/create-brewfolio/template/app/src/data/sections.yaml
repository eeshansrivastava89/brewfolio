sections:
  - discriminant: metrics-grid
    value:
      title: Operating metrics
      metrics:
        - label: weekly active experiments
          value: '18'
          delta: '+12%'
          delta_direction: up
          context: vs last week
        - label: rollout confidence
          value: '92%'
          delta: '+4 pts'
          delta_direction: up
          context: human review
        - label: support backlog
          value: '7'
          delta: '-3'
          delta_direction: down
          context: open issues
        - label: median response time
          value: '280ms'
          delta: '-18ms'
          delta_direction: up
          context: p95 steady
  - discriminant: results-list
    value:
      title: Decision log
      items:
        - title: Move feature flags into content config
          meta: Reduce deploy churn for homepage experiments.
        - title: Keep GitHub activity visible in the shell
          meta: Reinforce that the product is actively maintained.
        - title: Ship examples as editable data files
          href: https://github.com/eeshansrivastava89/brewfolio
          meta: No sample copy lives in the page component.
  - discriminant: content-area
    value:
      title: App workspace
      tagline: Use this block as the main interactive surface for the app. Replace the starter copy or leave it empty while you wire in your own UI.
      body: ''
      minHeight: 260px
  - discriminant: results-list
    value:
      title: Launch notes
      items:
        - title: Route rollout behind config, not deploys
          meta: Keep operational switches in content so the shell can change without a code push.
        - title: Publish evidence next to decisions
          meta: Link results to notebooks and source material instead of leaving them as isolated dashboard rows.
        - title: Keep the shipping log visible
          meta: Activity in the shell makes the product feel maintained, not staged.
