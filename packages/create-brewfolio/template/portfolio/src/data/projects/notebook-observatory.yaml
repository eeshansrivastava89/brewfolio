id: notebook-observatory
name: Notebook Observatory
url: https://jupyter.org/
status: in-progress
external: true
description: >-
  A sample product concept for turning notebook output into a browsable reading
  experience. It exists to demonstrate the drawer enhancement and the notebook
  summary card together.
shortDescription: Notebook-first product thinking with a reader-friendly shell.
image: ''
