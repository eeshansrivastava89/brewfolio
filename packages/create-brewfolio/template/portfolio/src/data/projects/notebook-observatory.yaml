overview: >-
  The observatory frame treats notebooks as publishable artifacts rather than
  back-office scratchpads. It is a good fit for research portfolios, developer
  tools, and any product that needs to explain decisions with evidence.
architecture: >-
  The starter uses Keystatic for the summary metadata and GitHub for the raw
  notebook body. Shared components then render the card, drawer, and notebook
  HTML without adding per-project page logic.
nextActions: >-
  Replace the repo and analysis route with your own notebook-backed project, or
  remove this tile if you only want two projects on the home page.
