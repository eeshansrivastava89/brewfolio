id: prompting-workbench
name: Prompting Workbench
url: https://www.oneusefulthing.org/
status: live
external: true
description: >-
  A sample project drawer for prompt experiments, reusable workflows, and linked
  essays. Use it to see how project copy, repo stats, and related writing fit
  together.
shortDescription: Prompt experiments, notes, and linked essays in one place.
image: ''
repo: https://github.com/openai/openai-cookbook
featuredNotebook: token-accounting-lab
tags:
  - name: Prompting
  - name: Editorial systems
  - name: Developer tools
relatedWriting:
  - practical-guide-to-using-ai-to
  - good-enough-prompting
overview: >-
  This project models a compact workflow for testing prompts, saving good
  variants, and connecting those experiments to published writing. It is useful
  as starter content because it exercises the project drawer without pretending
  to be your real work.
architecture: >-
  Content lives in Keystatic, the drawer reads project metadata from local YAML,
  and the repo card hydrates from GitHub at request time. That keeps the shell
  reusable while still making the example feel alive.
nextActions: >-
  Replace this with a real project, or delete the file entirely if you do not
  want starter tiles in the portfolio.
