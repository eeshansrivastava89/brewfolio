overview: >-
  Retrieval Studio is sample content for anyone who wants the portfolio to feel
  analytical rather than purely editorial. The tile, drawer, and notebook route
  all point back to the same idea: analysis should be visible work, not buried
  in a repo.
architecture: >-
  The project shell is local content, while notebook bodies stream from GitHub
  and render as HTML. That split keeps the scaffold light and makes the example
  easy to replace with your own notebook pipeline later.
nextActions: >-
  Swap in your own repository, point the analysis URL at your notebook route,
  and edit the related writing links when your archive is ready.
