id: embeddings-qa-lab
title: Question answering with embeddings
project: retrieval-studio
github_url: https://github.com/openai/openai-cookbook/blob/main/examples/Question_answering_using_embeddings.ipynb
description: >-
  A retrieval example that pairs embeddings with answer generation and exposes a
  richer notebook summary card.
date: '2025-02-02'
summary_status: inconclusive
summary_decision: >-
  Retrieval quality improves answer grounding, but chunking and source hygiene
  still decide whether the system feels trustworthy.
summary_methodology: >-
  Embed a document set, retrieve similar passages for a user query, and review
  answer quality against source passages and failure cases.
summary_warnings:
  - Better embeddings do not fix weak source material.
  - Long chunks can dilute relevance even when cosine similarity looks strong.
summary_metrics:
  - label: Retrieval hit rate
    value: '71%'
    delta: '+9 pts'
    delta_direction: up
    context: top-3 passages
  - label: Hallucination risk
    value: Medium
    delta_direction: neutral
    context: without citation enforcement
  - label: Review load
    value: '12 samples'
    delta: '+4'
    delta_direction: down
    context: manual checks
